# SERVER CONFIGURATION
spring.application.name=BE
spring.threads.virtual.enabled=true
# Preferred for Render, defaults to SERVER_PORT or 9999
server.port=${PORT:${SERVER_PORT}}
spring.banner.location=banner/banner.txt
server.version=${SERVER_VERSION:1.0.0}
allowed.origin=${ALLOWED_ORIGIN}
#FRONTEND INFORMATION
frontend.url=${ALLOWED_ORIGIN}
#DB GENERATOR
db.generator.is-generated=${GENERATE_DB:true}
db.generator.user-email=${USER_EMAIL:nickhunter3009@gmail.com}
db.generator.user-code=${USER_CODE:PH54328}
db.generator.user-name=${USER_NAME:Ngo Van Truong}
# db.generator.user-phone=${USER_PHONE:0385423035}
# STARTUP OPTIMIZATION
spring.main.lazy-initialization=true
spring.main.banner-mode=off
spring.jpa.open-in-view=false
# TOMCAT CONFIGURATION
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=20
# DATABASE CONFIGURATION
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:scrum}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# JPA CONFIGURATION
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.order_updates=true

spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.format_sql=true
# Config Batch Processing
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

#SECURITY CONFIGURATION
jwt.secret=${JWT_SECRET}
spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}
#WEB SOCKET CONFIGURATION
ws.applicationPrefix=/app
ws.topicPrefix=/topic
ws.registerEndpoint=/ws

#FILE UPLOAD INFORMATION
file.upload.staff.path=${FILE_UPLOAD_STAFF_PATH:src/main/resources/staff-excel}
file.upload.class.subject.path=${FILE_UPLOAD_CLASS_SUBJECT_PATH:src/main/resources/class-subject-excel}
file.upload.exam.shift.path=${FILE_UPLOAD_EXAM_SHIFT_PATH:src/main/resources/}
#Student import
file.upload.student.path=${FILE_UPLOAD_STAFF_PATH:src/main/resources/student-excel}
excel.file.to.database.job.cron=0/30 * * * * *
#Report compensation import
file.upload.reportcompensation.path=${FILE_UPLOAD_REPORT_COMPENSATION_PATH:src/main/resources/report-compensation-excel}
#todolist import
file.upload.todolist.path=${FILE_UPLOAD_TODO_LIST_PATH:src/main/resources/todolist-excel}
# Config cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Schedule
schedule.project.cron=${PROJECT_UPDATE_CRON:0 0 0 * * ?}

spring.messages.encoding=UTF-8

# Config email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

server.forward-headers-strategy=framework
spring.main.headless=true
java.awt.headless=true

l.smtp.ssl.protocols=TLSv1.2

logging.level.org.springframework.batch=DEBUG
logging.level.org.springframework.batch.core.step.item=DEBUG
logging.level.org.springframework.batch.item=DEBUG

#logging.level.org.springframework.security=DEBUG
#logging.level.org.springframework.web.client.RestTemplate=DEBUG
#logging.level.org.springframework.web=DEBUG
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Bật cache SIMPLE
spring.cache.type=SIMPLE
# Redis connection
#spring.data.redis.host=localhost
#spring.data.redis.port=6379
# Disable Redis repositories scanning to silence logs
spring.data.redis.repositories.enabled=false

# TTL mặc định cho cache (30 phút)
#spring.cache.redis.time-to-live=1800s

# Hibernate Query Plan Cache Optimization for low memory
spring.jpa.properties.hibernate.query.plan_cache_max_size=8
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=8
# Explicitly use MySQL 8 dialect if needed
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# Hibernate memory optimization
# Just use standard Hibernate memory flags
spring.jpa.properties.hibernate.generate_statistics=false


